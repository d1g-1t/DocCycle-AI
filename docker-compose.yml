services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: uvicorn src.main:app --host 0.0.0.0 --port 8100 --reload
    env_file: .env
    ports:
      - "8100:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: contractforge-api
    volumes:
      - ./src:/app/src:ro

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: >
      celery -A src.infrastructure.queue.celery_app worker
      -Q clm.parse,clm.ai,clm.workflow,clm.analytics,clm.maintenance
      -c 4 --loglevel=info
    env_file: .env
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://tempo:4317
      OTEL_SERVICE_NAME: contractforge-worker

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: runtime
    command: celery -A src.infrastructure.queue.celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      - redis
      - postgres

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: contractforge
      POSTGRES_USER: cf
      POSTGRES_PASSWORD: cf-secret-2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cf -d contractforge"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass cf-redis-secret
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "cf-redis-secret", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: /bin/sh
    command: /pull_models.sh
    volumes:
      - ollama_data:/root/.ollama
      - ./docker/ollama/pull_models.sh:/pull_models.sh

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio-secret-2026
    ports:
      - "9010:9000"
      - "9011:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  flower:
    image: mher/flower:2.0
    command: celery --broker=redis://:cf-redis-secret@redis:6379/0 flower
    ports:
      - "5556:5555"
    depends_on:
      - redis

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "4318:4317"
      - "3201:3200"
    volumes:
      - ./docker/tempo/tempo.yml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo

  loki:
    image: grafana/loki:2.9.8
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"
    volumes:
      - ./docker/loki/local-config.yaml:/etc/loki/local-config.yaml:ro

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3002:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - tempo
      - loki

  langfuse:
    image: langfuse/langfuse:2
    ports:
      - "3003:3000"
    environment:
      DATABASE_URL: postgresql://cf:cf-secret-2026@postgres:5432/contractforge
      NEXTAUTH_SECRET: replace-with-random
      SALT: replace-with-random
    depends_on:
      - postgres

volumes:
  postgres_data:
  ollama_data:
  minio_data:
  tempo_data:
  grafana_data:
